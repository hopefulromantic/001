<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Letter</title>
    <style>
        body {
            background-color: #f5f1e8;
            font-family: 'Courier Prime', Courier, monospace;
            font-size: 28px;
            color: #333333;
            line-height: 1.6;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            white-space: pre-wrap;
        }

        /* Centered Password Screen */
        #password-screen {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        input {
            border: none;
            border-bottom: 1px solid #333;
            font-family: 'Courier Prime', Courier, monospace;
            font-size: 14px;
            text-align: center;
            outline: none;
            padding: 5px;
            margin-top: 10px;
        }

        /* Hide the letter by default */
        #letter-content {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Password Prompt Overlay -->
    <div id="password-screen">
        <label for="password-input">enter password</label>
        <input type="password" id="password-input" onkeydown="checkPassword(event)" autofocus>
    </div>

    <!-- Your Actual Letter -->
    <div id="letter-content">Dear [Name],

Type your letter here...

Best,
[Your Name]</div>

    <script>
        function checkPassword(event) {
            // Checks if the reader pressed the 'Enter' key
            if (event.key === 'Enter') {
                const input = document.getElementById('password-input').value;
                
                // CHANGE YOUR PASSWORD HERE (Keep it lowercase inside the quotes)
                const correctPassword = 'mysweetboy'; 

                if (input.toLowerCase() === correctPassword) { 
                    // Hide the password entry and show the letter
                    document.getElementById('password-screen').style.display = 'none';
                    document.getElementById('letter-content').style.display = 'block';
                } else {
                    alert('Incorrect password. Try again.');
                    document.getElementById('password-input').value = '';
                }
            }
        }
    </script>
</body>
</html>
