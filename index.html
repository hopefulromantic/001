<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter</title>

<style>
body{
    background:#f5f1e8;
    font-family:'Courier Prime',Courier,monospace;
    font-size:22px;
    color:#333;
    line-height:1.6;
    max-width:800px;
    margin:50px auto;
    padding:20px;
    white-space:pre-wrap;
}

#password-screen{
    position:fixed;
    inset:0;
    background:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

input{
    border:none;
    border-bottom:1px solid #333;
    font-family:inherit;
    font-size:22px;
    text-align:center;
    outline:none;
    padding:5px;
    margin-top:10px;
}

#letter-content{
    display:none;
}

a{
    color:#333;
    text-decoration:underline;
}

textarea{
    width:100%;
    padding:10px;
    box-sizing:border-box;
    font-family:inherit;
    font-size:20px;
}

button{
    font-family:inherit;
    font-size:20px;
    padding:8px 16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="password-screen">
    <label>enter password</label>
    <input type="password" id="password-input" onkeydown="checkPassword(event)" autofocus>
</div>

<div id="letter-content">

    <i>190726</i>    i still buy every skincare product in packs of 2 out of habit...

<form id="letter-form">

<input type="hidden" name="_subject" value="Someone finished reading your letter">

<textarea
name="message"
rows="4"
placeholder="Leave a message (optional)..."></textarea>

<br><br>

<button type="submit">Submit</button>

</form>

</div>

<script>
function checkPassword(event){
    if(event.key==="Enter"){
        const input=document.getElementById("password-input").value;

        if(input.toLowerCase()==="qushairy33"){
            document.getElementById("password-screen").style.display="none";
            document.getElementById("letter-content").style.display="block";
        }else{
            alert("Incorrect password. Try again.");
            document.getElementById("password-input").value="";
        }
    }
}

document.getElementById("letter-form").addEventListener("submit",async function(e){
    e.preventDefault();

    const response=await fetch("https://formspree.io/f/mvzepvbo",{
        method:"POST",
        body:new FormData(this),
        headers:{
            "Accept":"application/json"
        }
    });

    if(response.ok){
        window.location.href="thankyou.html";
    }else{
        alert("Something went wrong. Please try again.");
    }
});
</script>

</body>
</html>
